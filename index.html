  <script>
    // 🚨 Emergency Cache Reset for Android Chrome
    const APP_VERSION = '1.1.1'; // Increment this to force a refresh
    if (localStorage.getItem('app_version') !== APP_VERSION) {
      localStorage.clear();
      if ('caches' in window) {
        caches.keys().then(names => names.forEach(name => caches.delete(name)));
      }
      localStorage.setItem('app_version', APP_VERSION);
    }

    // 🚨 Global Error Display (Helps debug white/black screen)
    window.onerror = function (msg, url, line) {
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:sans-serif;';
      div.innerHTML = '<b>App Error:</b> ' + msg + '<br><small>' + url + ' L:' + line + '</small>';
      document.body.appendChild(div);
      return false;
    };

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered!'))
          .catch(err => console.log('Service Worker failed:', err));
      });
    }
  </script>
